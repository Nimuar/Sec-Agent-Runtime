name: Simulation Harness Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install Node dependencies
        run: npm ci
        
      - name: Build Node runtime
        run: npm run build
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        run: pip install requests
          
      - name: Run Python simulation harness
        run: |
          # Start the Express API server in the background
          npx tsx api/src/server.ts &
          
          # Wait for the server to be ready (Port 3000)
          echo "Waiting for server to start on localhost:3000..."
          sleep 5
          
          if [ -d "tests" ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            export PYTHONPATH=$PYTHONPATH:.
            python -m unittest discover tests
          else
            echo "No tests directory found or directory is empty, skipping simulation tests"
          fi
