name: Simulation Harness Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install Node dependencies
        run: npm ci
        
      - name: Build Node runtime
        run: npm run build
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        run: pip install google-genai requests pytest python-dotenv
          
      - name: Run Python simulation harness
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Start the Express API server in the background
          (cd runtime && npx tsx src/server.ts &)
          
          # Wait for the server to be ready (Port 3000)
          echo "Waiting for server to start on localhost:3000..."
          sleep 5
          
          if [ -d "tests" ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            export PYTHONPATH=$PYTHONPATH:.
            pip install python-dotenv google-genai requests pytest pydantic
            pytest -s tests/test_sdk_e2e.py tests/test_boundary.py -v
          else
            echo "No tests directory found or directory is empty, skipping simulation tests"
          fi
          
      - name: Publish Evaluation Report
        if: always()
        run: |
          latest_report=$(ls -t tests/results/metrics_report_*.md | head -n 1 2>/dev/null || true)
          if [ -n "$latest_report" ] && [ -f "$latest_report" ]; then
            cat "$latest_report" >> $GITHUB_STEP_SUMMARY
            cp "$latest_report" tests/results/metrics_report.md
          fi
          
      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v3
        if: github.event_name == 'pull_request' && always()
        with:
          file-path: tests/results/metrics_report.md
          comment-tag: evaluation_report

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Evaluation-Report
          path: tests/results/metrics_report_*.md
