name: ci

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-dotenv google-genai requests pytest pydantic
      - name: Run E2E Tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          (cd runtime && npx tsx src/server.ts &)
          sleep 5
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/test_sdk_e2e.py -v
          
      - name: Publish Evaluation Report
        if: always()
        run: |
          if [ -f tests/results/metrics_report.md ]; then
            cat tests/results/metrics_report.md >> $GITHUB_STEP_SUMMARY
          fi
